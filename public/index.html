<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo Support - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--glow2);
      backdrop-filter: blur(22px) saturate(130%);
    }
    .login-title { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 6px; }
    .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      color: var(--text);
      background: rgba(255,255,255,0.03);
      outline: none;
      transition: var(--trans);
    }
    .field input:focus { border-color: rgba(185,170,255,0.45); box-shadow: 0 0 0 3px rgba(155,140,255,0.14); }
    .login-btn {
      width: 100%;
      border: 1px solid rgba(185,170,255,0.35);
      border-radius: 10px;
      padding: 11px 12px;
      color: #f6f4ff;
      font-weight: 700;
      background: linear-gradient(135deg, #8f7cff, #b09dff);
      cursor: pointer;
      transition: var(--trans);
      margin-top: 8px;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: var(--glow); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error { min-height: 20px; margin-top: 10px; color: #fda4af; font-size: 12px; }
    .login-note { margin-top: 16px; color: var(--text3); font-size: 12px; line-height: 1.6; }
    .login-note code { color: #d8d1ff; }
  </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="login-wrap">
  <form class="login-card" id="loginForm">
    <div class="login-title">Cosmo Support</div>
    <div class="login-sub">Sign in with your staff account.</div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button class="login-btn" id="loginBtn" type="submit">Log In</button>
    <div class="login-error" id="loginError"></div>

    <div class="login-note">
      Registration is disabled here. User creation and role management are available only in Owner/msd Admin Panel.
    </div>
  </form>
</div>

<script src="js/cosmic-bg.js"></script>
<script src="js/runtime-config.js"></script>
<script>
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e) => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });

async function checkAlreadyLoggedIn() {
  try {
    const r = await cosmoFetch('/api/auth/me');
    const d = await r.json();
    if (d && d.authenticated) window.location.href = 'dashboard.html';
  } catch (_) {}
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  btn.disabled = true;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const resp = await cosmoFetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) {
      errorEl.textContent = data.error || 'Login failed';
      btn.disabled = false;
      return;
    }
    window.location.href = 'dashboard.html';
  } catch (_) {
    errorEl.textContent = 'Network error. Try again.';
    btn.disabled = false;
  }
});

checkAlreadyLoggedIn();
</script>
</body>
</html>
